name: Deploy EC550 Syllabus Site

on:
  push:
    branches: [main, master]
    paths:
      - 'syllabus-site/**'
      - '.github/workflows/deploy-syllabus-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./syllabus-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
