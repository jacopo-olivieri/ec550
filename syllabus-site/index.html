<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EC550 Syllabus - Sustainable Development</title>
    <meta
      name="description"
      content="Interactive syllabus for EC550: The Economics of Sustainable Development."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Newsreader:opsz,wght@6..72,500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="masthead">
        <p class="eyebrow" id="courseCodeYear"></p>
        <h1 id="courseTitle"></h1>
        <p class="subtitle" id="courseSubtitle"></p>
        <p class="instructor" id="courseInstructor"></p>
        <div class="overview" id="courseOverview"></div>
      </header>

      <section class="controls" aria-label="Syllabus filters">
        <label class="control search-control" for="searchInput">
          <span>Search papers</span>
          <input
            id="searchInput"
            type="search"
            placeholder="Search by author, title, year, or journal"
            autocomplete="off"
          />
        </label>

        <label class="control checkbox-control" for="coreOnlyInput">
          <input id="coreOnlyInput" type="checkbox" />
          <span>Show core readings only</span>
        </label>

        <p class="result-count" id="resultCount" aria-live="polite"></p>
      </section>

      <p class="no-results" id="noResults" hidden>
        No papers match the current filters.
      </p>

      <section id="sections" class="sections" aria-label="Course sections"></section>
    </main>

    <footer class="page-footer">
      <p>
        Core readings are the papers marked with * in the syllabus PDF. To edit content,
        update <code>data.js</code>.
      </p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
